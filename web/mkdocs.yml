site_name: Wavox
site_description: A powerful, high-performance Discord music bot. Stream from YouTube, SoundCloud, and Spotify with crystal-clear audio.
site_url: https://wavox.gzeloni.dev

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: purple
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.top
  icon:
    logo: material/music-note

extra:
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.com/
      name: Discord

nav:
  - Home: index.md
  - Invite: invite.md
  - Terms of Service: terms.md
  - Privacy Policy: privacy.md

copyright: "&copy; 2026 Wavox — Developed by @gzeloni"

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
