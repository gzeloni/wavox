<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wavox Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f13;--surface:#1a1a24;--surface2:#24243a;
  --primary:#7c3aed;--primary-hover:#6d28d9;--primary-glow:rgba(124,58,237,.15);
  --text:#e2e2e8;--text-muted:#8888a0;--border:#2a2a3e;
  --green:#22c55e;--red:#ef4444;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--primary);text-decoration:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px}

/* Login */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px}
.login-logo{font-size:2.5rem;font-weight:700;letter-spacing:-1px}
.login-logo span{color:var(--primary)}
.login-sub{color:var(--text-muted);font-size:15px}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:12px 28px;border-radius:10px;border:none;
  font-size:14px;font-weight:600;cursor:pointer;
  transition:all .2s ease;font-family:inherit;
}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover);transform:translateY(-1px);box-shadow:0 4px 20px var(--primary-glow)}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:8px}
.btn-ghost{background:transparent;color:var(--text-muted);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}

/* App */
.app{display:none;max-width:960px;margin:0 auto;padding:32px 20px}
.header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--border);
}
.brand{font-size:1.3rem;font-weight:700;letter-spacing:-.5px}
.brand span{color:var(--primary)}
.user-info{display:flex;align-items:center;gap:10px}
.user-avatar{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);cursor:pointer;transition:border-color .2s}
.user-avatar:hover{border-color:var(--primary)}
.user-name{color:var(--text-muted);font-size:13px;font-weight:500}

/* Guilds */
.guilds-section{margin-bottom:28px}
.guilds-label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.guild-grid{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;scrollbar-width:thin;scrollbar-color:var(--surface2) transparent}
.guild-card{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;border-radius:12px;
  background:var(--surface);border:1px solid var(--border);
  cursor:pointer;transition:all .2s ease;
  white-space:nowrap;flex-shrink:0;
}
.guild-card:hover{border-color:var(--primary);background:var(--surface2)}
.guild-card.active{border-color:var(--primary);background:var(--primary-glow);box-shadow:0 0 20px var(--primary-glow)}
.guild-icon{
  width:36px;height:36px;border-radius:50%;
  background:var(--surface2);display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:600;color:var(--text-muted);
  overflow:hidden;flex-shrink:0;
}
.guild-icon img{width:100%;height:100%;object-fit:cover}
.guild-name{font-size:13px;font-weight:500}

/* Search */
.search-bar{
  display:flex;gap:8px;margin-bottom:20px;
}
.search-input{
  flex:1;padding:10px 16px;border-radius:10px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-size:14px;font-family:inherit;
  transition:border-color .2s;
}
.search-input:focus{outline:none;border-color:var(--primary)}
.search-input::placeholder{color:var(--text-muted)}
.search-btn{
  padding:10px 20px;border-radius:10px;border:none;
  background:var(--primary);color:#fff;font-size:14px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:background .2s;
  display:flex;align-items:center;gap:6px;
}
.search-btn:hover{background:var(--primary-hover)}

/* Main layout */
.main-layout{display:grid;grid-template-columns:1fr 300px;gap:20px}
.main-left{min-width:0}
.main-right{min-width:0}

/* Player */
.player-card{
  background:var(--surface);border-radius:16px;
  border:1px solid var(--border);
  padding:28px;margin-bottom:20px;
  transition:border-color .3s;
}
.player-empty{text-align:center;padding:40px 24px;color:var(--text-muted);font-size:14px}
.track-info{display:flex;gap:20px;margin-bottom:24px}
.track-thumb{
  width:100px;height:100px;border-radius:12px;
  object-fit:cover;background:var(--surface2);
  box-shadow:0 4px 16px rgba(0,0,0,.3);
}
.track-details{flex:1;display:flex;flex-direction:column;justify-content:center;gap:6px}
.track-title{font-size:1rem;font-weight:600;line-height:1.4}
.track-status{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted)}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.status-dot.paused{background:var(--red)}
.status-dot.stopped{background:var(--text-muted)}

/* Progress */
.progress{margin-bottom:24px}
.progress-bar{
  width:100%;height:5px;background:var(--surface2);
  border-radius:3px;overflow:hidden;cursor:pointer;
  transition:height .15s;
}
.progress-bar:hover{height:8px}
.progress-fill{height:100%;background:var(--primary);border-radius:3px;transition:width .3s linear}
.progress-times{display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:var(--text-muted);font-variant-numeric:tabular-nums}

/* Controls */
.controls{display:flex;align-items:center;justify-content:center;gap:12px}
.ctrl-btn{
  width:38px;height:38px;border-radius:50%;border:none;
  background:var(--surface2);color:var(--text-muted);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s ease;
}
.ctrl-btn:hover{background:var(--border);color:var(--text)}
.ctrl-btn.active{background:var(--primary);color:#fff}
.ctrl-btn.main{width:48px;height:48px;background:var(--primary);color:#fff}
.ctrl-btn.main:hover{background:var(--primary-hover);transform:scale(1.05)}
.ctrl-btn.danger:hover{background:var(--red);color:#fff}
.loop-label{font-size:11px;color:var(--text-muted);margin-top:8px;text-align:center;min-height:16px}

/* Lyrics */
.lyrics-card{
  background:var(--surface);border-radius:16px;
  border:1px solid var(--border);padding:20px;
  height:100%;display:flex;flex-direction:column;
}
.lyrics-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.lyrics-header h2{font-size:.9rem;font-weight:600}
.lyrics-meta{font-size:11px;color:var(--text-muted)}
.lyrics-body{
  flex:1;overflow-y:auto;max-height:420px;
  scrollbar-width:thin;scrollbar-color:var(--surface2) transparent;
}
.lyrics-line{
  padding:4px 8px;border-radius:6px;font-size:13px;line-height:1.8;
  color:var(--text-muted);transition:all .3s ease;
}
.lyrics-line.active{color:var(--text);background:var(--primary-glow);font-weight:500}
.lyrics-line.past{color:var(--text-muted);opacity:.5}
.lyrics-empty{text-align:center;padding:40px 16px;color:var(--text-muted);font-size:13px}

/* Queue */
.queue-card{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:24px}
.queue-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.queue-header h2{font-size:.9rem;font-weight:600}
.queue-actions{display:flex;align-items:center;gap:10px}
.queue-count{color:var(--text-muted);font-size:12px}
.queue-clear-btn{
  padding:4px 10px;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--text-muted);font-size:11px;
  cursor:pointer;font-family:inherit;transition:all .2s;
}
.queue-clear-btn:hover{border-color:var(--red);color:var(--red)}
.queue-list{list-style:none;display:flex;flex-direction:column;gap:2px}
.queue-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;transition:background .15s;position:relative;cursor:default}
.queue-item:hover{background:var(--surface2)}
.queue-pos{color:var(--text-muted);font-size:12px;min-width:22px;text-align:right;font-variant-numeric:tabular-nums;transition:opacity .15s}
.queue-play-btn{
  display:none;position:absolute;left:12px;width:22px;height:22px;
  border:none;border-radius:50%;background:var(--primary);color:#fff;
  cursor:pointer;align-items:center;justify-content:center;padding:0;
  transition:transform .1s;
}
.queue-play-btn svg{width:10px;height:10px}
.queue-play-btn:hover{transform:scale(1.15)}
.queue-item:hover .queue-pos{opacity:0}
.queue-item:hover .queue-play-btn{display:flex}
.queue-title{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.queue-dur{color:var(--text-muted);font-size:12px;font-variant-numeric:tabular-nums}
.queue-empty{text-align:center;padding:24px;color:var(--text-muted);font-size:13px}

/* Search suggestions */
.search-wrapper{position:relative;flex:1}
.search-suggestions{
  display:none;position:absolute;top:100%;left:0;right:0;z-index:50;
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  margin-top:4px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.4);
  max-height:320px;overflow-y:auto;
}
.search-suggestions.open{display:block}
.search-suggestion{
  display:flex;align-items:center;gap:12px;padding:10px 14px;
  cursor:pointer;transition:background .15s;
}
.search-suggestion:hover{background:var(--surface2)}
.search-suggestion-info{flex:1;min-width:0}
.search-suggestion-title{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.search-suggestion-channel{font-size:11px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.search-suggestion-dur{font-size:11px;color:var(--text-muted);font-variant-numeric:tabular-nums;white-space:nowrap}
.search-suggestion-source{width:20px;height:20px;flex-shrink:0;opacity:.6}
.search-suggestion-source svg{width:100%;height:100%}
.search-loading{padding:16px;text-align:center;color:var(--text-muted);font-size:12px}

/* Modal */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:100;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--surface);border-radius:20px;border:1px solid var(--border);
  padding:32px;max-width:480px;width:90%;max-height:85vh;overflow-y:auto;
  position:relative;
}
.modal-close{
  position:absolute;top:16px;right:16px;width:32px;height:32px;
  border-radius:50%;border:none;background:var(--surface2);color:var(--text-muted);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:18px;transition:all .2s;
}
.modal-close:hover{background:var(--border);color:var(--text)}
.modal-avatar{width:64px;height:64px;border-radius:50%;border:3px solid var(--primary);margin:0 auto 12px;display:block}
.modal-username{text-align:center;font-size:1.1rem;font-weight:700;margin-bottom:4px}
.modal-sub{text-align:center;font-size:12px;color:var(--text-muted);margin-bottom:24px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.stat-box{
  background:var(--surface2);border-radius:12px;padding:14px;text-align:center;
}
.stat-value{font-size:1.3rem;font-weight:700;color:var(--primary)}
.stat-label{font-size:11px;color:var(--text-muted);margin-top:4px}
.rate-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.rate-box{text-align:center}
.rate-value{font-size:1.1rem;font-weight:600}
.rate-label{font-size:11px;color:var(--text-muted);margin-top:2px}
.modal-section{margin-bottom:20px}
.modal-section h3{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.modal-list{list-style:none}
.modal-list li{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 10px;border-radius:8px;font-size:13px;
}
.modal-list li:hover{background:var(--surface2)}
.modal-list .pos{color:var(--text-muted);margin-right:10px;min-width:18px;font-variant-numeric:tabular-nums}
.modal-list .count{color:var(--text-muted);font-size:12px}
.hour-row{display:flex;align-items:center;gap:10px;padding:4px 0;font-size:13px}
.hour-label{min-width:70px;color:var(--text-muted)}
.hour-bar-bg{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden}
.hour-bar-fill{height:100%;background:var(--primary);border-radius:4px;transition:width .3s}
.hour-pct{min-width:36px;text-align:right;font-size:12px;color:var(--text-muted);font-variant-numeric:tabular-nums}
.modal-empty{text-align:center;padding:24px;color:var(--text-muted);font-size:13px}

@media(max-width:768px){
  .main-layout{grid-template-columns:1fr}
  .lyrics-body{max-height:250px}
  .track-info{flex-direction:column;align-items:center;text-align:center}
  .track-thumb{width:140px;height:140px}
  .header{flex-direction:column;gap:16px;text-align:center}
  .controls{gap:10px}
  .ctrl-btn{width:36px;height:36px}
  .ctrl-btn.main{width:44px;height:44px}
}
</style>
</head>
<body>

<div id="login-screen" class="login-screen">
  <div class="login-logo">W<span>avox</span></div>
  <p class="login-sub">Sign in with Discord to control your music.</p>
  <a href="/dashboard/login" class="btn btn-primary">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.36-.698.772-1.362 1.225-1.993a.076.076 0 0 0-.041-.107 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128c.125-.093.25-.19.372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
    Sign in with Discord
  </a>
</div>

<div id="app" class="app">
  <div class="header">
    <div class="brand">W<span>avox</span></div>
    <div class="user-info">
      <img id="user-avatar" class="user-avatar" src="" alt="" title="View your stats">
      <span id="user-name" class="user-name"></span>
      <a href="/dashboard/logout" class="btn btn-ghost btn-sm">Logout</a>
    </div>
  </div>

  <div class="guilds-section">
    <span class="guilds-label">Your Servers</span>
    <div id="guild-grid" class="guild-grid"></div>
  </div>

  <div class="search-bar">
    <div class="search-wrapper">
      <input id="search-input" class="search-input" type="text" placeholder="Search or paste a URL to play..." autocomplete="off">
      <div id="search-suggestions" class="search-suggestions"></div>
    </div>
    <button id="search-btn" class="search-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      Play
    </button>
  </div>

  <div class="main-layout">
    <div class="main-left">
      <div id="player-card" class="player-card">
        <div id="player-empty" class="player-empty">Select a server to see playback status.</div>
        <div id="player-content" style="display:none">
          <div class="track-info">
            <img id="track-thumb" class="track-thumb" src="" alt="">
            <div class="track-details">
              <div id="track-title" class="track-title">-</div>
              <div class="track-status">
                <div id="status-dot" class="status-dot stopped"></div>
                <span id="status-text">Stopped</span>
              </div>
            </div>
          </div>
          <div class="progress">
            <div class="progress-bar" id="progress-bar">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="progress-times">
              <span id="time-elapsed">0:00</span>
              <span id="time-duration">0:00</span>
            </div>
          </div>
          <div class="controls">
            <button class="ctrl-btn" id="btn-shuffle" title="Shuffle">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
            </button>
            <button class="ctrl-btn" id="btn-previous" title="Previous">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            <button class="ctrl-btn main" id="btn-playpause" title="Play/Pause">
              <svg id="icon-pause" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h4v16H6zm8 0h4v16h-4z"/></svg>
              <svg id="icon-play" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <button class="ctrl-btn" id="btn-skip" title="Skip">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
            <button class="ctrl-btn" id="btn-loop" title="Loop">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
            </button>
            <button class="ctrl-btn danger" id="btn-stop" title="Stop &amp; Disconnect">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
            </button>
          </div>
          <div class="loop-label" id="loop-label"></div>
        </div>
      </div>

      <div class="queue-card">
        <div class="queue-header">
          <h2>Queue</h2>
          <div class="queue-actions">
            <span id="queue-count" class="queue-count"></span>
            <button id="btn-clear-queue" class="queue-clear-btn" style="display:none">Clear</button>
          </div>
        </div>
        <div id="queue-empty" class="queue-empty">Queue is empty</div>
        <ul id="queue-list" class="queue-list" style="display:none"></ul>
      </div>
    </div>

    <div class="main-right">
      <div class="lyrics-card">
        <div class="lyrics-header">
          <h2>Lyrics</h2>
          <span id="lyrics-meta" class="lyrics-meta"></span>
        </div>
        <div id="lyrics-body" class="lyrics-body">
          <div id="lyrics-empty" class="lyrics-empty">Play a track to see synced lyrics.</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Profile Modal -->
<div id="profile-modal" class="modal-overlay">
  <div class="modal">
    <button class="modal-close" id="modal-close">&times;</button>
    <img id="modal-avatar" class="modal-avatar" src="" alt="">
    <div id="modal-username" class="modal-username"></div>
    <div class="modal-sub">Last 30 days</div>
    <div id="modal-content">
      <div class="modal-empty">Select a server first to see your stats.</div>
    </div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
let ws = null, state = null, guildId = null;
let currentTrackUrl = null;
let lyricsLines = [];
let meData = null;
let rafId = null;
let pollTimer = null;

function fmt(s) {
  if (!s && s !== 0) return '0:00';
  s = Math.floor(s);
  const m = Math.floor(s / 60);
  return m + ':' + String(s % 60).padStart(2, '0');
}

function guildInitials(name) {
  return name.split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// --- Elapsed: calculated from server timestamps, never accumulated ---
function getElapsed() {
  if (!state || !state.now_playing) return 0;
  const np = state.now_playing;
  const offset = np.offset || 0;
  const startedAt = np.started_at || 0;
  if (state.is_paused && np.paused_at) {
    return offset + (np.paused_at - startedAt);
  }
  if (state.is_playing && startedAt > 0) {
    return offset + (Date.now() / 1000 - startedAt);
  }
  return offset;
}

// --- localStorage helpers ---
function saveState() {
  if (!guildId || !state) return;
  try {
    localStorage.setItem(`wavox:${guildId}`, JSON.stringify(state));
  } catch {}
}

function loadState(id) {
  try {
    const raw = localStorage.getItem(`wavox:${id}`);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

// --- Init ---
async function init() {
  try {
    const r = await fetch('/api/me');
    if (r.status === 401) { $('#login-screen').style.display = 'flex'; return; }
    meData = await r.json();
    $('#login-screen').style.display = 'none';
    $('#app').style.display = 'block';
    $('#user-name').textContent = meData.username;
    if (meData.avatar) {
      const avatarUrl = `https://cdn.discordapp.com/avatars/${meData.user_id}/${meData.avatar}.png?size=64`;
      $('#user-avatar').src = avatarUrl;
      $('#modal-avatar').src = avatarUrl;
    }
    $('#modal-username').textContent = meData.username;

    const grid = $('#guild-grid');
    (meData.guilds || []).forEach(g => {
      const card = document.createElement('div');
      card.className = 'guild-card';
      card.dataset.id = g.id;
      const icon = document.createElement('div');
      icon.className = 'guild-icon';
      if (g.icon) {
        icon.innerHTML = `<img src="https://cdn.discordapp.com/icons/${g.id}/${g.icon}.png?size=64" alt="">`;
      } else {
        icon.textContent = guildInitials(g.name);
      }
      const name = document.createElement('span');
      name.className = 'guild-name';
      name.textContent = g.name;
      card.appendChild(icon);
      card.appendChild(name);
      card.addEventListener('click', () => selectGuild(g.id));
      grid.appendChild(card);
    });
  } catch {
    $('#login-screen').style.display = 'flex';
  }
}

// --- Guild selection ---
function selectGuild(id) {
  document.querySelectorAll('.guild-card').forEach(c =>
    c.classList.toggle('active', c.dataset.id === id)
  );
  guildId = id;
  currentTrackUrl = null;

  // Restore from localStorage immediately (instant UI)
  const cached = loadState(id);
  if (cached) applyState(cached, true);

  connectGuild(id);
}

async function connectGuild(id) {
  if (ws) { ws.close(); ws = null; }
  clearInterval(pollTimer);

  // Fetch fresh state from server
  await pollState(id);

  // Connect WebSocket
  connectWS(id);

  // Periodic poll as fallback
  pollTimer = setInterval(() => {
    if (guildId === id) pollState(id);
  }, 15000);
}

async function pollState(id) {
  try {
    const r = await fetch(`/api/guilds/${id}/status`);
    if (r.ok) applyState(await r.json());
  } catch {}
}

function connectWS(id) {
  if (ws) { ws.close(); ws = null; }
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/api/guilds/${id}/ws`);
  ws.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'state_update') applyState(msg.data);
    } catch {}
  };
  ws.onclose = () => {
    setTimeout(() => { if (guildId === id) connectWS(id); }, 3000);
  };
}

// --- Render loop (requestAnimationFrame) ---
function startRenderLoop() {
  if (rafId) return;
  let lastSec = -1;
  function tick() {
    rafId = requestAnimationFrame(tick);
    if (!state || !state.now_playing) return;
    const elapsed = getElapsed();
    const dur = state.now_playing.duration || 0;
    const sec = Math.floor(elapsed);
    // Only update DOM when the second changes
    if (sec !== lastSec) {
      lastSec = sec;
      const clamped = Math.min(elapsed, dur);
      $('#time-elapsed').textContent = fmt(clamped);
      const pct = dur > 0 ? Math.min(clamped / dur * 100, 100) : 0;
      $('#progress-fill').style.width = pct + '%';
      updateLyricsHighlight(clamped);
    }
  }
  tick();
}

// --- State rendering ---
function applyState(s, fromCache) {
  state = s;
  if (!fromCache) saveState();

  if (!s.now_playing) {
    $('#player-empty').style.display = 'block';
    $('#player-empty').textContent = 'Nothing playing right now.';
    $('#player-content').style.display = 'none';
    currentTrackUrl = null;
    clearLyrics();
    return;
  }

  $('#player-empty').style.display = 'none';
  $('#player-content').style.display = 'block';

  const np = s.now_playing;
  const isNewTrack = currentTrackUrl !== np.webpage_url;

  $('#track-title').textContent = np.title || '-';
  $('#track-thumb').src = np.thumbnail || '';
  $('#track-thumb').style.display = np.thumbnail ? 'block' : 'none';

  const dot = $('#status-dot'), txt = $('#status-text');
  if (s.is_playing) { dot.className = 'status-dot'; txt.textContent = 'Playing'; }
  else if (s.is_paused) { dot.className = 'status-dot paused'; txt.textContent = 'Paused'; }
  else { dot.className = 'status-dot stopped'; txt.textContent = 'Stopped'; }

  $('#icon-pause').style.display = s.is_playing ? 'block' : 'none';
  $('#icon-play').style.display = s.is_playing ? 'none' : 'block';

  const dur = np.duration || 0;
  const elapsed = Math.min(getElapsed(), dur);
  $('#time-elapsed').textContent = fmt(elapsed);
  $('#time-duration').textContent = fmt(dur);
  const pct = dur > 0 ? Math.min(elapsed / dur * 100, 100) : 0;
  $('#progress-fill').style.width = pct + '%';

  startRenderLoop();

  if (isNewTrack) {
    currentTrackUrl = np.webpage_url;
    fetchLyrics(np.title);
  }

  // Loop label
  const loopLabels = { off: '', track: 'Looping track', queue: 'Looping queue' };
  const mode = s.loop_mode || 'off';
  $('#loop-label').textContent = loopLabels[mode] || '';
  $('#btn-loop').classList.toggle('active', mode !== 'off');

  // Queue
  const q = s.queue || [];
  if (q.length === 0) {
    $('#queue-empty').style.display = 'block';
    $('#queue-list').style.display = 'none';
    $('#queue-count').textContent = '';
    $('#btn-clear-queue').style.display = 'none';
  } else {
    $('#queue-empty').style.display = 'none';
    $('#queue-list').style.display = 'flex';
    $('#queue-count').textContent = `${q.length} track${q.length > 1 ? 's' : ''}`;
    $('#btn-clear-queue').style.display = 'inline-block';
    const list = $('#queue-list');
    list.innerHTML = q.map((t, i) => `
      <li class="queue-item" data-pos="${i + 1}">
        <span class="queue-pos">${i + 1}</span>
        <button class="queue-play-btn" title="Play now">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <span class="queue-title">${esc(t.title || 'Unknown')}</span>
        <span class="queue-dur">${fmt(t.duration)}</span>
      </li>`).join('');
    list.querySelectorAll('.queue-play-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const pos = parseInt(btn.closest('.queue-item').dataset.pos);
        sendAction('skip_to', { position: pos });
      });
    });
  }
}

// --- Lyrics ---
function clearLyrics() {
  lyricsLines = [];
  $('#lyrics-body').innerHTML = '<div class="lyrics-empty">Play a track to see synced lyrics.</div>';
  $('#lyrics-meta').textContent = '';
}

async function fetchLyrics(title) {
  if (!title) { clearLyrics(); return; }
  $('#lyrics-body').innerHTML = '<div class="lyrics-empty">Loading lyrics...</div>';
  $('#lyrics-meta').textContent = '';

  try {
    const r = await fetch(`/api/lyrics?q=${encodeURIComponent(title)}`);
    const data = await r.json();

    if (data.synced) {
      lyricsLines = parseLRC(data.synced);
      renderLyrics(lyricsLines);
      if (data.artist || data.title) {
        $('#lyrics-meta').textContent = `${data.artist} — ${data.title}`;
      }
    } else if (data.plain) {
      lyricsLines = [];
      const lines = data.plain.split('\n');
      const body = $('#lyrics-body');
      body.innerHTML = '';
      lines.forEach(line => {
        const el = document.createElement('div');
        el.className = 'lyrics-line';
        el.textContent = line || '\u00A0';
        body.appendChild(el);
      });
      if (data.artist || data.title) {
        $('#lyrics-meta').textContent = `${data.artist} — ${data.title}`;
      }
    } else {
      $('#lyrics-body').innerHTML = '<div class="lyrics-empty">No lyrics found for this track.</div>';
    }
  } catch {
    $('#lyrics-body').innerHTML = '<div class="lyrics-empty">Failed to load lyrics.</div>';
  }
}

function parseLRC(text) {
  const lines = [];
  for (const raw of text.split('\n')) {
    const match = raw.match(/^\[(\d{2}):(\d{2})\.(\d{2,3})\]\s*(.*)/);
    if (match) {
      const mins = parseInt(match[1]);
      const secs = parseInt(match[2]);
      const ms = parseInt(match[3].padEnd(3, '0'));
      const time = mins * 60 + secs + ms / 1000;
      lines.push({ time, text: match[4] || '\u00A0' });
    }
  }
  return lines;
}

function renderLyrics(lines) {
  const body = $('#lyrics-body');
  body.innerHTML = '';
  lines.forEach((line, i) => {
    const el = document.createElement('div');
    el.className = 'lyrics-line';
    el.textContent = line.text;
    el.dataset.index = i;
    body.appendChild(el);
  });
}

function updateLyricsHighlight(elapsed) {
  if (lyricsLines.length === 0) return;
  const body = $('#lyrics-body');
  const els = body.querySelectorAll('.lyrics-line');
  if (els.length === 0) return;

  let activeIdx = -1;
  for (let i = lyricsLines.length - 1; i >= 0; i--) {
    if (elapsed >= lyricsLines[i].time) {
      activeIdx = i;
      break;
    }
  }

  els.forEach((el, i) => {
    el.classList.remove('active', 'past');
    if (i === activeIdx) el.classList.add('active');
    else if (i < activeIdx) el.classList.add('past');
  });

  if (activeIdx >= 0 && els[activeIdx]) {
    els[activeIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

// --- Actions ---
async function sendAction(action, extra = {}) {
  if (!guildId) return;
  try {
    await fetch(`/api/guilds/${guildId}/playback`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, ...extra }),
    });
  } catch {}
}

$('#btn-playpause').addEventListener('click', () => {
  if (state) sendAction(state.is_playing ? 'pause' : 'resume');
});
$('#btn-skip').addEventListener('click', () => sendAction('skip'));
$('#btn-previous').addEventListener('click', () => sendAction('previous'));
$('#btn-shuffle').addEventListener('click', () => sendAction('shuffle'));
$('#btn-loop').addEventListener('click', () => sendAction('loop'));
$('#btn-stop').addEventListener('click', () => sendAction('stop'));
$('#btn-clear-queue').addEventListener('click', () => sendAction('clear'));

$('#progress-bar').addEventListener('click', e => {
  if (!state || !state.now_playing || !state.now_playing.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pos = Math.floor((e.clientX - rect.left) / rect.width * state.now_playing.duration);
  sendAction('goto', { position: pos });
});

// --- Search / Play ---

let searchTimer = null;
let suggestionsOpen = false;

function playQuery(query) {
  if (!query || !guildId) return;
  sendAction('play', { query });
  $('#search-input').value = '';
  closeSuggestions();
}

function closeSuggestions() {
  $('#search-suggestions').classList.remove('open');
  suggestionsOpen = false;
}

function doPlay() {
  playQuery($('#search-input').value.trim());
}

async function fetchSuggestions(query) {
  if (!query || query.length < 2 || !guildId) { closeSuggestions(); return; }
  if (query.startsWith('http://') || query.startsWith('https://')) { closeSuggestions(); return; }

  const box = $('#search-suggestions');
  box.innerHTML = '<div class="search-loading">Searching...</div>';
  box.classList.add('open');
  suggestionsOpen = true;

  try {
    const r = await fetch(`/api/search?q=${encodeURIComponent(query)}&guild_id=${guildId}`);
    if (!r.ok) { closeSuggestions(); return; }
    const results = await r.json();
    if (!results.length) {
      box.innerHTML = '<div class="search-loading">No results found.</div>';
      return;
    }
    box.innerHTML = results.map(r => `
      <div class="search-suggestion" data-url="${esc(r.url)}">
        <div class="search-suggestion-info">
          <div class="search-suggestion-title">${esc(r.title)}</div>
          <div class="search-suggestion-channel">${esc(r.channel)}</div>
        </div>
        <span class="search-suggestion-dur">${fmt(r.duration)}</span>
        <span class="search-suggestion-source">${SOURCE_ICONS[r.source] || SOURCE_ICONS.youtube}</span>
      </div>
    `).join('');
    box.querySelectorAll('.search-suggestion').forEach(el => {
      el.addEventListener('click', () => {
        playQuery(el.dataset.url || el.querySelector('.search-suggestion-title').textContent);
      });
    });
  } catch {
    closeSuggestions();
  }
}

$('#search-input').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => fetchSuggestions(e.target.value.trim()), 400);
});
$('#search-btn').addEventListener('click', doPlay);
$('#search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doPlay();
  if (e.key === 'Escape') closeSuggestions();
});
document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrapper')) closeSuggestions();
});

// --- Profile Modal ---
$('#user-avatar').addEventListener('click', async () => {
  const modal = $('#profile-modal');
  modal.classList.add('open');

  if (!guildId) {
    $('#modal-content').innerHTML = '<div class="modal-empty">Select a server first to see your stats.</div>';
    return;
  }

  $('#modal-content').innerHTML = '<div class="modal-empty">Loading stats...</div>';

  try {
    const r = await fetch(`/api/guilds/${guildId}/user-status`);
    const data = await r.json();

    if (!data || !data.total_plays) {
      $('#modal-content').innerHTML = '<div class="modal-empty">No listening data in the last 30 days.</div>';
      return;
    }

    let html = '';

    // Overview
    html += `<div class="stat-grid">
      <div class="stat-box"><div class="stat-value">${data.total_plays}</div><div class="stat-label">Plays</div></div>
      <div class="stat-box"><div class="stat-value">${data.total_skips}</div><div class="stat-label">Skips</div></div>
      <div class="stat-box"><div class="stat-value">${data.total_likes}</div><div class="stat-label">Likes</div></div>
    </div>`;

    // Rates
    html += `<div class="rate-grid">
      <div class="rate-box"><div class="rate-value">${data.skip_rate}%</div><div class="rate-label">Skip Rate</div></div>
      <div class="rate-box"><div class="rate-value">${data.like_rate}%</div><div class="rate-label">Like Rate</div></div>
      <div class="rate-box"><div class="rate-value">${data.repeat_rate}%</div><div class="rate-label">Repeat Rate</div></div>
    </div>`;

    // Top Tracks
    if (data.top_tracks && data.top_tracks.length) {
      html += '<div class="modal-section"><h3>Top Tracks</h3><ul class="modal-list">';
      data.top_tracks.forEach((t, i) => {
        html += `<li><span><span class="pos">${i+1}.</span> ${esc(t.title)}</span><span class="count">${t.plays}x</span></li>`;
      });
      html += '</ul></div>';
    }

    // Top Artists
    if (data.top_artists && data.top_artists.length) {
      html += '<div class="modal-section"><h3>Top Artists</h3><ul class="modal-list">';
      data.top_artists.forEach((a, i) => {
        html += `<li><span><span class="pos">${i+1}.</span> ${esc(a.artist)}</span><span class="count">${a.plays}x</span></li>`;
      });
      html += '</ul></div>';
    }

    // Listening Hours
    if (data.hour_blocks) {
      const labels = ['00 - 06', '06 - 12', '12 - 18', '18 - 24'];
      const total = data.hour_blocks.reduce((a, b) => a + b, 0) || 1;
      html += '<div class="modal-section"><h3>Listening Hours</h3>';
      data.hour_blocks.forEach((count, i) => {
        const pct = Math.round(count / total * 100);
        html += `<div class="hour-row">
          <span class="hour-label">${labels[i]}</span>
          <div class="hour-bar-bg"><div class="hour-bar-fill" style="width:${pct}%"></div></div>
          <span class="hour-pct">${pct}%</span>
        </div>`;
      });
      html += '</div>';
    }

    $('#modal-content').innerHTML = html;
  } catch {
    $('#modal-content').innerHTML = '<div class="modal-empty">Failed to load stats.</div>';
  }
});

$('#modal-close').addEventListener('click', () => {
  $('#profile-modal').classList.remove('open');
});
$('#profile-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) $('#profile-modal').classList.remove('open');
});

init();
