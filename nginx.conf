map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream wavox_frontend { server 127.0.0.1:3000; }

server {
    listen 443 ssl;
    server_name wavox.gzeloni.dev;

    ssl_certificate     /etc/ssl/certs/cloudflare_client.pem;
    ssl_certificate_key /etc/ssl/private/cloudflare_client.key;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location ~ ^/api/guilds/[^/]+/ws$ {
        proxy_pass http://wavox_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
        proxy_buffering off;
    }

    location /api/ {
        proxy_pass http://wavox_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location / {
        proxy_pass http://wavox_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}

server {
    listen 80;
    server_name wavox.gzeloni.dev;
    return 301 https://$host$request_uri;
}
